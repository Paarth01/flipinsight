services:
  api:
    build: .
    container_name: flipinsight-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Uncomment to switch from SQLite to Postgres. If you do, update
  # DATABASE_URL in db/models.py (or read it from an env var) to point here.
