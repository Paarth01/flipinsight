services:
  api:
    build: .
    container_name: flipinsight-api
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://flipinsight:flipinsight@db:5432/flipinsight
      - FLIPINSIGHT_API_KEY=dev-secret-key
    depends_on:
      - db
    volumes:
      # Mount dashboard dir so HTML/CSS/JS changes are live without rebuild
      - ./dashboard/static:/app/dashboard/static:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16-alpine
    container_name: flipinsight-db
    environment:
      - POSTGRES_USER=flipinsight
      - POSTGRES_PASSWORD=flipinsight
      - POSTGRES_DB=flipinsight
    ports:
      - "5432:5432"
    volumes:
      - flipinsight_pgdata:/var/lib/postgresql/data

volumes:
  flipinsight_pgdata:
